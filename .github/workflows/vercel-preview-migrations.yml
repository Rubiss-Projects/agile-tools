name: Vercel Preview Migrations

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: vercel-preview-migrations-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  migrate-preview:
    name: Run preview database migrations
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_VERSION: '24'
      DATABASE_URL: ${{ secrets.PRISMA_PREVIEW_DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate preview database secret
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "PRISMA_PREVIEW_DATABASE_URL GitHub secret is required for preview migrations." >&2
            exit 1
          fi

      - name: Run preview database migrations
        shell: bash
        run: pnpm --filter @agile-tools/db exec prisma migrate deploy
