name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '24'
  COMPOSE_CI_APP_BASE_URL: 'http://127.0.0.1:3000'
  COMPOSE_CI_ENCRYPTION_KEY: 'ci-encryption-key-32-characters-000000'
  COMPOSE_CI_SESSION_SECRET: 'ci-session-secret-32-characters-00000'
  COMPOSE_CI_DEFAULT_SYNC_INTERVAL_MINUTES: '10'
  COMPOSE_CI_LOG_LEVEL: 'warn'
  COMPOSE_CI_ALLOW_LOOPBACK_HTTP_BYPASS: 'true'

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - &checkout-repository
        name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          pull: true
          push: false

  docker-compose-config:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - *checkout-repository

      - &create-compose-ci-env
        name: Create Compose environment file
        run: |
          cat > .env <<EOF
          APP_BASE_URL=${COMPOSE_CI_APP_BASE_URL}
          ENCRYPTION_KEY=${COMPOSE_CI_ENCRYPTION_KEY}
          SESSION_SECRET=${COMPOSE_CI_SESSION_SECRET}
          DEFAULT_SYNC_INTERVAL_MINUTES=${COMPOSE_CI_DEFAULT_SYNC_INTERVAL_MINUTES}
          LOG_LEVEL=${COMPOSE_CI_LOG_LEVEL}
          ALLOW_LOOPBACK_HTTP_BYPASS=${COMPOSE_CI_ALLOW_LOOPBACK_HTTP_BYPASS}
          EOF

      - name: Validate Compose configuration
        run: docker compose config --quiet

  docker-compose-smoke:
    name: Docker Compose Smoke Test
    needs: docker-compose-config
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - *checkout-repository

      - *create-compose-ci-env

      - name: Reset Compose state
        run: docker compose down -v --remove-orphans

      - name: Start PostgreSQL
        run: docker compose up -d postgres --wait

      - name: Build bootstrap image
        run: docker compose --profile bootstrap build bootstrap

      - name: Bootstrap database and queue state
        run: docker compose --profile bootstrap run --rm bootstrap

      - name: Start runtime stack
        run: docker compose --profile runtime up --build --wait --wait-timeout 180 -d

      - name: Verify web health endpoint
        run: |
          for attempt in {1..30}; do
            if curl --silent --show-error --fail \
              -H 'x-forwarded-proto: https' \
              http://127.0.0.1:3000/api/healthz > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Compose web service did not become healthy in time."
          exit 1

      - name: Verify runtime services are running
        run: |
          running_services="$(docker compose ps --status running --services)"
          printf '%s\n' "$running_services"

          echo "$running_services" | grep -qx 'web'
          echo "$running_services" | grep -qx 'worker'

      - name: Print Compose diagnostics
        if: failure()
        run: |
          docker compose ps --all
          docker compose logs --no-color

      - name: Stop Compose stack
        if: always()
        run: docker compose down -v --remove-orphans

  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @agile-tools/db exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run unit and component tests
        run: pnpm test

      - name: Build workspace
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/agile_tools
          PORT: '3000'
          APP_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          ENCRYPTION_KEY: ci-encryption-key-32-characters-000000
          SESSION_SECRET: ci-session-secret-32-characters-00000
          DEFAULT_SYNC_INTERVAL_MINUTES: '10'
          LOG_LEVEL: warn
        run: pnpm build

  contract-tests:
    name: Contract Tests
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @agile-tools/db exec prisma generate

      - name: Run contract tests
        run: pnpm test:contract

  integration-tests:
    name: Integration Tests
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @agile-tools/db exec prisma generate

      - name: Run integration tests
        run: pnpm test:integration

  e2e-tests:
    name: End-to-End Tests
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/agile_tools
      PORT: '3000'
      APP_BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      ALLOW_LOOPBACK_HTTP_BYPASS: 'true'
      ENCRYPTION_KEY: ci-encryption-key-32-characters-000000
      SESSION_SECRET: ci-session-secret-32-characters-00000
      DEFAULT_SYNC_INTERVAL_MINUTES: '10'
      LOG_LEVEL: warn
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agile_tools
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agile_tools"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @agile-tools/db exec prisma generate

      - name: Apply database migrations
        run: pnpm --filter @agile-tools/db exec prisma migrate deploy

      - name: Build workspace
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start web application
        run: |
          pnpm --filter @agile-tools/web start > /tmp/agile-tools-web.log 2>&1 &
          echo $! > /tmp/agile-tools-web.pid

      - name: Wait for web application
        run: |
          for attempt in {1..60}; do
            if curl --silent --fail "$PLAYWRIGHT_BASE_URL" > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Web application did not become ready in time."
          cat /tmp/agile-tools-web.log
          exit 1

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Stop web application
        if: always()
        run: |
          if [ -f /tmp/agile-tools-web.pid ]; then
            kill "$(cat /tmp/agile-tools-web.pid)" || true
          fi

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
            /tmp/agile-tools-web.log
          if-no-files-found: ignore
          retention-days: 14

  performance-tests:
    name: Performance Benchmarks
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @agile-tools/db exec prisma generate

      - name: Run performance benchmarks
        run: pnpm test:perf