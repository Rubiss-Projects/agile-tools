name: agile-tools-jira-local

services:
  jira-db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: jira
      POSTGRES_USER: jira
      POSTGRES_PASSWORD: jira
    volumes:
      - jira_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jira -d jira"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  jira:
    image: atlassian/jira-software:${JIRA_IMAGE_TAG:-9.12}
    depends_on:
      jira-db:
        condition: service_healthy
    environment:
      ATL_JDBC_URL: jdbc:postgresql://jira-db:5432/jira
      ATL_JDBC_USER: jira
      ATL_JDBC_PASSWORD: jira
      ATL_DB_DRIVER: org.postgresql.Driver
      ATL_DB_TYPE: postgres72
      ATL_TOMCAT_SCHEME: http
      ATL_TOMCAT_SECURE: "false"
      JVM_MINIMUM_MEMORY: ${JIRA_JVM_MINIMUM_MEMORY:-1g}
      JVM_MAXIMUM_MEMORY: ${JIRA_JVM_MAXIMUM_MEMORY:-2g}
      VERBOSE_LOGS: ${JIRA_VERBOSE_LOGS:-false}
    ports:
      - "${JIRA_PORT:-8080}:8080"
    volumes:
      - jira_home:/var/atlassian/application-data/jira
    restart: unless-stopped

  jira-bootstrap:
    profiles: ["bootstrap"]
    image: node:24-alpine
    depends_on:
      jira:
        condition: service_started
    environment:
      JIRA_BOOTSTRAP_BASE_URL: ${JIRA_BOOTSTRAP_BASE_URL:-http://jira:8080}
      JIRA_BOOTSTRAP_PUBLIC_BASE_URL: ${JIRA_BOOTSTRAP_PUBLIC_BASE_URL:-http://localhost:${JIRA_PORT:-8080}}
      JIRA_BOOTSTRAP_USERNAME: ${JIRA_BOOTSTRAP_USERNAME:-}
      JIRA_BOOTSTRAP_PASSWORD: ${JIRA_BOOTSTRAP_PASSWORD:-}
      JIRA_BOOTSTRAP_PROJECT_KEY: ${JIRA_BOOTSTRAP_PROJECT_KEY:-AGILE}
      JIRA_BOOTSTRAP_PROJECT_NAME: ${JIRA_BOOTSTRAP_PROJECT_NAME:-Agile Tools Local Demo}
      JIRA_BOOTSTRAP_BOARD_NAME: ${JIRA_BOOTSTRAP_BOARD_NAME:-Agile Tools Kanban}
      JIRA_BOOTSTRAP_FILTER_NAME: ${JIRA_BOOTSTRAP_FILTER_NAME:-Agile Tools Kanban Filter}
      JIRA_BOOTSTRAP_ISSUE_LABEL: ${JIRA_BOOTSTRAP_ISSUE_LABEL:-agile-tools-bootstrap}
      JIRA_BOOTSTRAP_SAMPLE_ISSUE_COUNT: ${JIRA_BOOTSTRAP_SAMPLE_ISSUE_COUNT:-3}
      JIRA_BOOTSTRAP_WAIT_TIMEOUT_MS: ${JIRA_BOOTSTRAP_WAIT_TIMEOUT_MS:-600000}
      JIRA_BOOTSTRAP_WAIT_INTERVAL_MS: ${JIRA_BOOTSTRAP_WAIT_INTERVAL_MS:-5000}
      JIRA_BOOTSTRAP_CREATE_PAT: ${JIRA_BOOTSTRAP_CREATE_PAT:-true}
      JIRA_BOOTSTRAP_PAT_NAME: ${JIRA_BOOTSTRAP_PAT_NAME:-agile-tools-local}
      JIRA_BOOTSTRAP_PAT_EXPIRATION_DAYS: ${JIRA_BOOTSTRAP_PAT_EXPIRATION_DAYS:-30}
      JIRA_BOOTSTRAP_OUTPUT_PATH: /bootstrap-output/jira-bootstrap.json
    command: ["node", "/bootstrap/jira-bootstrap.mjs"]
    volumes:
      - ./docker/jira-bootstrap.mjs:/bootstrap/jira-bootstrap.mjs:ro
      - ./.jira-local:/bootstrap-output

volumes:
  jira_db_data:
  jira_home: